experiment:
  name: exp06_decay_pipeline
  description: >
    Execução de um pipeline supervisionado completo da aula 04, 
    com a adição do weight decay no otimizador.
    O objetivo é demonstrar a operacionalização do weight decay
    em um pipeline de ML dentro de uma estrutura rastreável.

data:
  seed: 42
  n_samples: 1500
  n_features: 5
  test_size: 0.3

train:
  epochs: 20
  batch_size: 64
  lr: 0.001
  weight_decay: 1e-5

model:
  hidden_dim: 64
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_decay_pipeline
  tags:
    aula: "06"
    pipeline: supervised
    run_type: pipeline
    purpose: weight_decay_flow
    dataset: synthetic_credit

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu