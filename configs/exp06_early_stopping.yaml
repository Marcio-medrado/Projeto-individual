experiment:
  name: exp06_early_stopping_pipeline
  description: >
    Execução de um pipeline supervisionado completo da aula 04, 
    com a adição do early stopping no treinamento.
    O objetivo é demonstrar a operacionalização do early stopping
    em um pipeline de ML dentro de uma estrutura rastreável.

data:
  seed: 42
  n_samples: 1500
  n_features: 5
  test_size: 0.3

train:
  epochs: 20
  batch_size: 64
  lr: 0.001
  early_stopping:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 5
    min_delta: 0.0005
    restore_best_weights: true

model:
  hidden_dim: 64
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_early_stopping_pipeline
  tags:
    aula: "06"
    pipeline: supervised
    run_type: pipeline
    purpose: early_stopping_flow
    dataset: synthetic_credit

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu