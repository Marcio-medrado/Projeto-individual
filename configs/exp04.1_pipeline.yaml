experiment:
  name: exp04.1_credit_pipeline
  description: >
    Execução de um pipeline supervisionado completo com aumento de capacidade:
    hidden_dim alterado de 64 para 128 para avaliar impacto na acurácia.
    Baseado no exp04_pipeline.yaml.

data:
  seed: 42
  n_samples: 1500
  n_features: 5
  test_size: 0.3

train:
  epochs: 20
  batch_size: 64
  lr: 0.001

model:
  hidden_dim: 128
  n_classes: 2

tracking:
  tool: mlflow
  experiment_name: taia_pipeline
  tags:
    aula: "06"
    pipeline: supervised
    run_type: pipeline
    purpose: capacity_adjustment
    dataset: synthetic_credit

runtime:
  deterministic: true
  device_preference: auto   # auto|cuda|mps|cpu
